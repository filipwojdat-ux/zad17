<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Galeria – Bari</title>
    <link rel="stylesheet" href="projektcss.css">
</head>
<body>

<header>
    <h1>Galeria Bari </h1>
    <nav>
        <ul>
            <li><a href="projektGlowna.html">Strona główna</a></li>
            <li><a href="projektgaleria.html">Galeria</a></li>
            <li><a href="projektinfo.html">Informacje</a></li>
        </ul>
    </nav>
</header>

<section class="slider">
    <img id="slider" src="baner.jpg" alt="Zdjęcie Bari">
    <div class="przyciski-slidera">
        <button onclick="poprzednie()">⟵</button>
        <button onclick="nastepne()">⟶</button>
    </div>
</section>

<section class="galeria">
    <img src="1.jpg" alt="Polignano a Mare">
    <img src="2.jpg" alt="Bari panorama">
    <img src="3.jpg" alt="Widok na Bari">
    <img src="4.jpg" alt="Zamek w Bari">
    <img src="5.jpg" alt="Offer module Bari">
    <img src="6.jpg" alt="Zdjęcie Bari">
    <img src="7.jpg" alt="Widok miasta">
    <img src="8.jpg" alt="Projekt CSS">
    <img src="9.jpg" alt="Galeria projektu">
    <img src="10.jpg" alt="Strona główna projektu">
</section>
<script>
let zdjecia = [
    "1.jpg",
    "2.jpg",
    "3.jpg",
    "4.jpg",
    "5.jpg",
    "6.jpg",
    "7.jpg",
    "8.jpg",
    "9.jpg",
    "10.jpg",
    "baner.jpg",
];

let numer = 0;

function nastepne(){
    numer = (numer + 1) % zdjecia.length;
    document.getElementById("slider").src = zdjecia[numer];
}

function poprzednie(){
    numer = (numer - 1 + zdjecia.length) % zdjecia.length;
    document.getElementById("slider").src = zdjecia[numer];
}
</script>

</body>
</html>
